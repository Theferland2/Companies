name: Deploy PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - master
      - main

jobs:
  deploy-preview:
    name: Deploy PR Preview
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Build
        run: pnpm build

      # --- DigitalOcean PR Preview ---

      - name: Authenticate doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Create or Update PR Preview
        env:
          DO_APP_NAME: ${{ secrets.DO_APP_NAME }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # Resolve App ID from name
          APP_ID=$(doctl apps list --format ID,Spec.Name --no-header \
            | grep "$DO_APP_NAME" | awk '{print $1}')

          if [ -z "$APP_ID" ]; then
            echo "❌ App '$DO_APP_NAME' not found in DigitalOcean"
            exit 1
          fi
          echo "✅ App ID: $APP_ID"

          echo "🚀 Creating/Updating preview for PR #$PR_NUMBER..."
          # Note: doctl apps create-preview creates a preview deployment for the PR.
          # It uses the latest spec from the main app but pointed at the PR branch.
          doctl apps create-preview "$APP_ID" --pull-request "$PR_NUMBER"
