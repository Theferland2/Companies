name: Configure Database URL

on:
  workflow_dispatch:
    inputs:
      database_url:
        description: 'Supabase DATABASE_URL (format: postgresql://user:pass@host:port/db)'
        required: true
        type: string

jobs:
  update-database-url:
    name: Update DATABASE_URL Secret
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Get App ID
        id: get-app
        run: |
          APP_NAME="${{ secrets.DO_APP_NAME }}"
          echo "Looking for app: $APP_NAME"
          
          APP_ID=$(doctl apps list --format ID,Spec.Name --no-header | grep "$APP_NAME" | awk '{print $1}')
          
          if [ -z "$APP_ID" ]; then
            echo "Error: App '$APP_NAME' not found"
            doctl apps list
            exit 1
          fi
          
          echo "Found App ID: $APP_ID"
          echo "app_id=$APP_ID" >> $GITHUB_OUTPUT

      - name: Get Current App Spec
        id: get-spec
        run: |
          doctl apps spec get ${{ steps.get-app.outputs.app_id }} > current-spec.yaml
          cat current-spec.yaml

      - name: Update DATABASE_URL in Spec
        run: |
          # Install yq for YAML manipulation
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          
          # Update DATABASE_URL value
          yq eval '.services[0].envs = (.services[0].envs | map(select(.key == "DATABASE_URL").value = "${{ github.event.inputs.database_url }}" | .))' -i current-spec.yaml
          
          echo "Updated spec:"
          cat current-spec.yaml

      - name: Apply Updated Spec
        run: |
          doctl apps update ${{ steps.get-app.outputs.app_id }} --spec current-spec.yaml

      - name: Trigger Deployment
        run: |
          echo "Triggering new deployment..."
          doctl apps create-deployment ${{ steps.get-app.outputs.app_id }} --wait

      - name: Verify Deployment
        run: |
          echo "Deployment initiated. Check logs with:"
          echo "doctl apps logs ${{ steps.get-app.outputs.app_id }} --type run --follow"
          
          # Get deployment status
          doctl apps get ${{ steps.get-app.outputs.app_id }}

      - name: Summary
        run: |
          echo "✅ DATABASE_URL updated successfully"
          echo "📦 New deployment triggered"
          echo "🔍 Monitor logs: https://cloud.digitalocean.com/apps/${{ steps.get-app.outputs.app_id }}"
