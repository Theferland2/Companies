name: Deploy to DigitalOcean

on:
  push:
    branches:
      - master
      - main

jobs:
  build-test-deploy:
    name: Build, Test & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Build
        run: pnpm build

      - name: Run tests
        run: pnpm test:run

      - name: Configure Database Secret
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
      
      - name: Update App Spec with DATABASE_URL
        run: |
          # Usar App ID directamente si está configurado, sino buscar por nombre
          if [ -n "${{ secrets.DO_APP_ID }}" ]; then
            APP_ID="${{ secrets.DO_APP_ID }}"
            echo "✅ Using App ID from secret: $APP_ID"
          else
            echo "⚠️  DO_APP_ID not set, searching by app name..."
            APP_ID=$(doctl apps list --format ID,Spec.Name --no-header | grep "${{ secrets.DO_APP_NAME }}" | awk '{print $1}')
            
            if [ -z "$APP_ID" ]; then
              echo "❌ Error: App '${{ secrets.DO_APP_NAME }}' not found"
              echo "Available apps:"
              doctl apps list
              exit 1
            fi
            
            echo "✅ Found App ID by name: $APP_ID"
          fi
          
          # Descargar spec actual
          doctl apps spec get "$APP_ID" > app-spec.yaml
          
          # Instalar yq para manipular YAML
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          
          # Actualizar DATABASE_URL en el spec
          yq eval '
            .services[0].envs = (
              .services[0].envs | 
              map(
                if .key == "DATABASE_URL" then
                  .value = "${{ secrets.DATABASE_URL }}" |
                  .scope = "RUN_AND_BUILD_TIME" |
                  .type = "SECRET"
                else . end
              )
            )
          ' -i app-spec.yaml
          
          echo "📄 Updated DATABASE_URL in app spec"
          yq eval '.services[0].envs[] | select(.key == "DATABASE_URL")' app-spec.yaml
          
          # Aplicar spec actualizado
          doctl apps update "$APP_ID" --spec app-spec.yaml
          echo "✅ App spec updated with DATABASE_URL secret"

      - name: Trigger App Platform Deployment
        uses: digitalocean/app_action@v2
        with:
          app_name: companies-app
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
