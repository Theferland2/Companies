name: Deploy to DigitalOcean

on:
  push:
    branches:
      - master
      - main

jobs:
  build-test-deploy:
    name: Build, Test & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Build
        run: pnpm build

      - name: Run tests
        run: pnpm test:run



      - name: Configure Database Secret
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Update App Spec with DATABASE_URL
        env:
          DO_APP_NAME: ${{ secrets.DO_APP_NAME || 'companies-app' }}
          DATABASE_URL_SECRET: ${{ secrets.DATABASE_URL }}
        run: |
          # 1. Obtener App ID 
          APP_ID=$(doctl apps list --format ID,Spec.Name --no-header | grep "$DO_APP_NAME" | awk '{print $1}')
          
          if [ -z "$APP_ID" ]; then
            echo "❌ Error: No se encontró una aplicación con el nombre $DO_APP_NAME"
            exit 1
          fi

          echo "✅ Found App ID: $APP_ID"

          # 2. Descargar spec actual
          doctl apps spec get "$APP_ID" > app-spec.yaml
          
          # 3. Instalar yq
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          
          # 4. Actualizar DATABASE_URL en el spec (asegurando que sea SECRET)
          # Buscamos el servicio que tiene la DATABASE_URL y la actualizamos
          cat > update_spec.py << 'EOF'
import os
import yaml

# Leer el spec YAML
with open('app-spec.yaml', 'r') as f:
    spec = yaml.safe_load(f)

# Actualizar DATABASE_URL en todos los servicios
if 'services' in spec:
    for service in spec['services']:
        if 'envs' in service:
            for env in service['envs']:
                if env.get('key') == 'DATABASE_URL':
                    env['value'] = os.environ.get('DATABASE_URL_SECRET', '')
                    env['type'] = 'SECRET'
                    env['scope'] = 'RUN_AND_BUILD_TIME'

# Guardar de vuelta
with open('app-spec.yaml', 'w') as f:
    yaml.dump(spec, f)
EOF

          python3 update_spec.py
          
          # 5. Aplicar spec actualizado
          doctl apps update "$APP_ID" --spec app-spec.yaml

      - name: Trigger App Platform Deployment
        uses: digitalocean/app_action/deploy@v2
        with:
          app_name: ${{ secrets.DO_APP_NAME || 'companies-app' }}
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
