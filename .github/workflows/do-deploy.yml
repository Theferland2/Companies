name: Deploy to DigitalOcean

on:
  push:
    branches:
      - master
      - main

jobs:
  build-test-deploy:
    name: Build, Test & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Build
        run: pnpm build

      - name: Run tests
        run: pnpm test:run

      # --- DigitalOcean Deploy ---

      - name: Authenticate doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Prepare DO App Spec with injected secrets
        env:
          DO_APP_NAME:        ${{ secrets.DO_APP_NAME }}
          DATABASE_URL:       ${{ secrets.DATABASE_URL }}
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          BETTER_AUTH_URL:    ${{ secrets.BETTER_AUTH_URL }}
        run: |
          # Resolve App ID from name
          APP_ID=$(doctl apps list --format ID,Spec.Name --no-header \
            | grep "$DO_APP_NAME" | awk '{print $1}')

          if [ -z "$APP_ID" ]; then
            echo "❌ App '$DO_APP_NAME' not found in DigitalOcean"
            exit 1
          fi
          echo "✅ App ID: $APP_ID"

          # Download current spec
          doctl apps spec get "$APP_ID" > app-spec.yaml

          # Install yq
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

          # Helper to upsert (create or update) env vars in the first service
          upsert_env() {
            local KEY="$1"
            local VAL="$2"
            local TYPE="${3:-SECRET}"
            if [ -z "$VAL" ]; then
              echo "⏭ Skipping $KEY (not set)"
              return
            fi
            
            # Check if key exists
            if yq eval ".services[0].envs[] | select(.key == \"$KEY\")" app-spec.yaml > /dev/null 2>&1; then
              # Update existing key
              yq eval -i "(.services[0].envs[] | select(.key == \"$KEY\") | .value) = \"$VAL\"" app-spec.yaml
              yq eval -i "(.services[0].envs[] | select(.key == \"$KEY\") | .type) = \"$TYPE\"" app-spec.yaml
              yq eval -i "(.services[0].envs[] | select(.key == \"$KEY\") | .scope) = \"RUN_AND_BUILD_TIME\"" app-spec.yaml
              echo "✅ Updated $KEY"
            else
              # Add new key
              yq eval -i ".services[0].envs += [{\"key\": \"$KEY\", \"value\": \"$VAL\", \"type\": \"$TYPE\", \"scope\": \"RUN_AND_BUILD_TIME\"}]" app-spec.yaml
              echo "✅ Added $KEY"
            fi
          }

          upsert_env "DATABASE_URL"               "$DATABASE_URL"
          upsert_env "GEMINI_API_KEY"             "$GEMINI_API_KEY"
          upsert_env "OPENROUTER_API_KEY"         "$OPENROUTER_API_KEY"
          upsert_env "BETTER_AUTH_SECRET"         "$BETTER_AUTH_SECRET"
          upsert_env "BETTER_AUTH_URL"            "$BETTER_AUTH_URL" "GENERAL"
          upsert_env "PAPERCLIP_MIGRATION_AUTO_APPLY" "true" "GENERAL"

          # Ensure the port is correctly set to 3100 to match Dockerfile
          echo "🔧 Setting http_port to 3100 in app spec..."
          yq eval -i ".services[0].http_port = 3100" app-spec.yaml

      - name: Deploy to App Platform
        uses: digitalocean/app_action/deploy@v2
        with:
          token:             ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
          app_spec_location: app-spec.yaml
        continue-on-error: true
        id: deploy_step

      - name: Capture deployment logs on failure
        if: steps.deploy_step.outcome == 'failure'
        env:
          DO_APP_NAME: ${{ secrets.DO_APP_NAME }}
        run: |
          # Get App ID
          APP_ID=$(doctl apps list --format ID,Spec.Name --no-header \
            | grep "$DO_APP_NAME" | awk '{print $1}')
          
          echo "=== Getting latest deployment info ==="
          LATEST_DEP=$(doctl apps list-deployments "$APP_ID" --format ID,Phase,Cause --no-header | head -n1)
          DEP_ID=$(echo "$LATEST_DEP" | awk '{print $1}')
          echo "Deployment ID: $DEP_ID"
          echo "Status: $LATEST_DEP"
          
          echo -e "\n=== Deployment progress details ==="
          doctl apps get-deployment "$APP_ID" "$DEP_ID" --format Progress,Phase,Cause
          
          echo -e "\n=== Attempting to get deployment logs ==="
          doctl apps logs "$APP_ID" --type deploy --follow false --tail 200 || echo "Deploy logs not available"
          
          echo -e "\n=== Attempting to get runtime logs ==="
          doctl apps logs "$APP_ID" --type run --follow false --tail 100 || echo "Runtime logs not available"
          
          exit 1
