name: Deploy to DigitalOcean

on:
  push:
    branches:
      - master
      - main

jobs:
  build-test-deploy:
    name: Build, Test & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Build
        run: pnpm build

      - name: Run tests
        run: pnpm test:run

      - name: Configure Database Secret
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Update App Spec with DATABASE_URL
        env:
          DO_APP_NAME: ${{ secrets.DO_APP_NAME || 'companies-app' }}
          DATABASE_URL_SECRET: ${{ secrets.DATABASE_URL }}
        run: |
          # 1. Obtener App ID
          APP_ID=$(doctl apps list --format ID,Spec.Name --no-header | grep "$DO_APP_NAME" | awk '{print $1}')

          if [ -z "$APP_ID" ]; then
            echo "❌ Error: No se encontró una aplicación con el nombre $DO_APP_NAME"
            exit 1
          fi

          echo "✅ Found App ID: $APP_ID"

          # 2. Descargar spec actual
          doctl apps spec get "$APP_ID" > app-spec.yaml

          # 3. Instalar yq (evita usar Python yaml.dump que produce YAML incompatible con doctl)
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

          # 4. Actualizar DATABASE_URL en el spec usando yq (in-place, preserva el formato)
          yq eval '
            (.services[] | select(.envs != null) | .envs[] | select(.key == "DATABASE_URL") | .value) = strenv(DATABASE_URL_SECRET) |
            (.services[] | select(.envs != null) | .envs[] | select(.key == "DATABASE_URL") | .type) = "SECRET" |
            (.services[] | select(.envs != null) | .envs[] | select(.key == "DATABASE_URL") | .scope) = "RUN_AND_BUILD_TIME"
          ' -i app-spec.yaml

          echo "✅ Updated app-spec.yaml with DATABASE_URL secret"

          # 5. Aplicar spec actualizado
          doctl apps update "$APP_ID" --spec app-spec.yaml

      - name: Trigger App Platform Deployment
        uses: digitalocean/app_action/deploy@v2
        with:
          app_name: ${{ secrets.DO_APP_NAME || 'companies-app' }}
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
