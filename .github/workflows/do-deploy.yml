name: Deploy to DigitalOcean

on:
  push:
    branches:
      - master
      - main

jobs:
  build-test-deploy:
    name: Build, Test & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Build
        run: pnpm build

      - name: Run tests
        run: pnpm test:run

      # --- DigitalOcean Deploy ---

      - name: Authenticate doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Sync secrets from GitHub to DO App Spec
        env:
          DO_APP_NAME:        ${{ secrets.DO_APP_NAME }}
          DATABASE_URL:       ${{ secrets.DATABASE_URL }}
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          # Resolve App ID from name
          APP_ID=$(doctl apps list --format ID,Spec.Name --no-header \
            | grep "$DO_APP_NAME" | awk '{print $1}')

          if [ -z "$APP_ID" ]; then
            echo "❌ App '$DO_APP_NAME' not found in DigitalOcean"
            exit 1
          fi
          echo "✅ App ID: $APP_ID"

          # Download current spec (preserves all existing env vars not managed here)
          doctl apps spec get "$APP_ID" > app-spec.yaml

          # Install yq
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

          # Only update env vars that have a non-empty value in GH Secrets
          # This avoids overwriting DO-managed vars with empty strings.
          update_if_set() {
            local KEY="$1"
            local VAL="$2"
            if [ -z "$VAL" ]; then
              echo "⏭ Skipping $KEY (not set in GH Secrets)"
              return
            fi
            export _KEY="$KEY" _VAL="$VAL"
            yq eval -i '
              (.services[] | .envs[] | select(.key == env(_KEY)) | .value) = env(_VAL) |
              (.services[] | .envs[] | select(.key == env(_KEY)) | .type)  = "SECRET" |
              (.services[] | .envs[] | select(.key == env(_KEY)) | .scope) = "RUN_AND_BUILD_TIME"
            ' app-spec.yaml
            echo "✅ Updated $KEY"
          }

          update_if_set "DATABASE_URL"       "$DATABASE_URL"
          update_if_set "GEMINI_API_KEY"     "$GEMINI_API_KEY"
          update_if_set "OPENROUTER_API_KEY" "$OPENROUTER_API_KEY"

          # Apply updated spec
          doctl apps update "$APP_ID" --spec app-spec.yaml
          echo "✅ Secrets synced to DO app spec"

      - name: Deploy to App Platform
        uses: digitalocean/app_action/deploy@v2
        with:
          app_name: ${{ secrets.DO_APP_NAME }}
          token:    ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
        continue-on-error: true
        id: deploy_step

      - name: Capture deployment logs on failure
        if: steps.deploy_step.outcome == 'failure'
        env:
          DO_APP_NAME: ${{ secrets.DO_APP_NAME }}
        run: |
          # Get App ID
          APP_ID=$(doctl apps list --format ID,Spec.Name --no-header \
            | grep "$DO_APP_NAME" | awk '{print $1}')
          
          echo "=== Getting latest deployment info ==="
          LATEST_DEP=$(doctl apps list-deployments "$APP_ID" --format ID,Phase,Cause --no-header | head -n1)
          DEP_ID=$(echo "$LATEST_DEP" | awk '{print $1}')
          echo "Deployment ID: $DEP_ID"
          echo "Status: $LATEST_DEP"
          
          echo -e "\n=== Deployment progress details ==="
          doctl apps get-deployment "$APP_ID" "$DEP_ID" --format Progress.Steps
          
          echo -e "\n=== Attempting to get deployment logs ==="
          doctl apps logs "$APP_ID" --type deploy --follow false --tail 200 || echo "Deploy logs not available"
          
          echo -e "\n=== Attempting to get runtime logs ==="
          doctl apps logs "$APP_ID" --type run --follow false --tail 100 || echo "Runtime logs not available"
          
          exit 1
