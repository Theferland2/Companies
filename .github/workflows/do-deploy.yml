name: Deploy to DigitalOcean

on:
  push:
    branches:
      - master
      - main

jobs:
  build-test-deploy:
    name: Build, Test & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Build
        run: pnpm build

      - name: Run tests
        run: pnpm test:run

      # --- DigitalOcean Deploy ---

      - name: Authenticate doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Prepare DO App Spec with injected secrets
        env:
          DO_APP_NAME:        ${{ secrets.DO_APP_NAME }}
          DATABASE_URL:       ${{ secrets.DATABASE_URL }}
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          # Resolve App ID from name
          APP_ID=$(doctl apps list --format ID,Spec.Name --no-header \
            | grep "$DO_APP_NAME" | awk '{print $1}')

          if [ -z "$APP_ID" ]; then
            echo "❌ App '$DO_APP_NAME' not found in DigitalOcean"
            exit 1
          fi
          echo "✅ App ID: $APP_ID"

          # Download current spec
          doctl apps spec get "$APP_ID" > app-spec.yaml

          # Install yq
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

          # Helper to upsert (create or update) env vars in the first service
          upsert_env() {
            local KEY="$1"
            local VAL="$2"
            local TYPE="${3:-SECRET}"
            if [ -z "$VAL" ]; then
              echo "⏭ Skipping $KEY (not set)"
              return
            fi
            export _KEY="$KEY" _VAL="$VAL" _TYPE="$TYPE"
            
            # This yq command finds the key in .services[0].envs. 
            # If it exists, updates it. If not, appends it.
            yq eval -i '
              with(.services[0].envs;
                if (map(select(.key == env(_KEY))) | length == 0) then
                  . += [{"key": env(_KEY), "value": env(_VAL), "type": env(_TYPE), "scope": "RUN_AND_BUILD_TIME"}]
                else
                  (.[] | select(.key == env(_KEY)) | .value) = env(_VAL) |
                  (.[] | select(.key == env(_KEY)) | .type)  = env(_TYPE) |
                  (.[] | select(.key == env(_KEY)) | .scope) = "RUN_AND_BUILD_TIME"
                end
              )
            ' app-spec.yaml
            echo "✅ Upserted $KEY"
          }

          upsert_env "DATABASE_URL"               "$DATABASE_URL"
          upsert_env "GEMINI_API_KEY"             "$GEMINI_API_KEY"
          upsert_env "OPENROUTER_API_KEY"         "$OPENROUTER_API_KEY"
          upsert_env "PAPERCLIP_MIGRATION_AUTO_APPLY" "true" "GENERAL"

      - name: Deploy to App Platform
        uses: digitalocean/app_action/deploy@v2
        with:
          token:             ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
          app_spec_location: app-spec.yaml
        continue-on-error: true
        id: deploy_step

      - name: Capture deployment logs on failure
        if: steps.deploy_step.outcome == 'failure'
        env:
          DO_APP_NAME: ${{ secrets.DO_APP_NAME }}
        run: |
          # Get App ID
          APP_ID=$(doctl apps list --format ID,Spec.Name --no-header \
            | grep "$DO_APP_NAME" | awk '{print $1}')
          
          echo "=== Getting latest deployment info ==="
          LATEST_DEP=$(doctl apps list-deployments "$APP_ID" --format ID,Phase,Cause --no-header | head -n1)
          DEP_ID=$(echo "$LATEST_DEP" | awk '{print $1}')
          echo "Deployment ID: $DEP_ID"
          echo "Status: $LATEST_DEP"
          
          echo -e "\n=== Deployment progress details ==="
          doctl apps get-deployment "$APP_ID" "$DEP_ID" --format Progress.Steps
          
          echo -e "\n=== Attempting to get deployment logs ==="
          doctl apps logs "$APP_ID" --type deploy --follow false --tail 200 || echo "Deploy logs not available"
          
          echo -e "\n=== Attempting to get runtime logs ==="
          doctl apps logs "$APP_ID" --type run --follow false --tail 100 || echo "Runtime logs not available"
          
          exit 1
