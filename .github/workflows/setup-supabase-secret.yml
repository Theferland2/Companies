name: Setup Supabase Secret (One-Time)

on:
  workflow_dispatch:
    inputs:
      supabase_connection_string:
        description: 'Full Supabase Connection String (Transaction Pooler)'
        required: true
        type: string

jobs:
  configure-secret:
    name: Configure DATABASE_URL as App Platform Secret
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Get App Details
        id: app-info
        run: |
          APP_NAME="${{ secrets.DO_APP_NAME }}"
          echo "🔍 Searching for app: $APP_NAME"
          
          APP_INFO=$(doctl apps list --format ID,Spec.Name --no-header | grep "$APP_NAME")
          
          if [ -z "$APP_INFO" ]; then
            echo "❌ Error: App '$APP_NAME' not found"
            echo "Available apps:"
            doctl apps list
            exit 1
          fi
          
          APP_ID=$(echo "$APP_INFO" | awk '{print $1}')
          echo "✅ Found App ID: $APP_ID"
          echo "app_id=$APP_ID" >> $GITHUB_OUTPUT

      - name: Validate Connection String Format
        run: |
          CONNECTION_STRING="${{ github.event.inputs.supabase_connection_string }}"
          
          if [[ ! "$CONNECTION_STRING" =~ ^postgresql:// ]]; then
            echo "❌ Error: Connection string must start with 'postgresql://'"
            exit 1
          fi
          
          if [[ ! "$CONNECTION_STRING" =~ pooler\.supabase\.com:6543 ]]; then
            echo "⚠️  Warning: Expected Supabase pooler on port 6543"
            echo "Current: $CONNECTION_STRING"
            echo "Continuing anyway..."
          fi
          
          echo "✅ Connection string format validated"

      - name: Update App Spec with Secret
        run: |
          # Get current spec
          doctl apps spec get ${{ steps.app-info.outputs.app_id }} > app-spec.yaml
          
          # Install yq
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          
          # Update DATABASE_URL env var
          yq eval '
            .services[0].envs = (
              .services[0].envs | 
              map(
                if .key == "DATABASE_URL" then
                  .value = "${{ github.event.inputs.supabase_connection_string }}" |
                  .scope = "RUN_AND_BUILD_TIME" |
                  .type = "SECRET"
                else . end
              )
            )
          ' -i app-spec.yaml
          
          echo "📄 Updated app spec:"
          yq eval '.services[0].envs[] | select(.key == "DATABASE_URL")' app-spec.yaml

      - name: Apply Configuration
        run: |
          echo "🚀 Applying updated configuration..."
          doctl apps update ${{ steps.app-info.outputs.app_id }} --spec app-spec.yaml

      - name: Trigger Deployment
        id: deploy
        run: |
          echo "🔄 Triggering new deployment..."
          DEPLOYMENT_ID=$(doctl apps create-deployment ${{ steps.app-info.outputs.app_id }} --format ID --no-header)
          echo "deployment_id=$DEPLOYMENT_ID" >> $GITHUB_OUTPUT
          echo "✅ Deployment ID: $DEPLOYMENT_ID"

      - name: Wait for Deployment
        run: |
          echo "⏳ Waiting for deployment to complete (this may take 5-10 minutes)..."
          
          MAX_WAIT=600  # 10 minutes
          ELAPSED=0
          INTERVAL=15
          
          while [ $ELAPSED -lt $MAX_WAIT ]; do
            STATUS=$(doctl apps get ${{ steps.app-info.outputs.app_id }} --format ActiveDeployment.Phase --no-header)
            echo "[$ELAPSED s] Deployment status: $STATUS"
            
            if [ "$STATUS" = "ACTIVE" ]; then
              echo "✅ Deployment successful!"
              exit 0
            elif [ "$STATUS" = "ERROR" ] || [ "$STATUS" = "CANCELED" ]; then
              echo "❌ Deployment failed with status: $STATUS"
              exit 1
            fi
            
            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done
          
          echo "⚠️  Deployment still in progress after ${MAX_WAIT}s. Check manually:"
          echo "https://cloud.digitalocean.com/apps/${{ steps.app-info.outputs.app_id }}"

      - name: Verify Database Connection
        run: |
          echo "🔍 Checking app logs for database connection..."
          doctl apps logs ${{ steps.app-info.outputs.app_id }} --type run --tail 50 | grep -i "database\|postgres\|migration" || true

      - name: Deployment Summary
        if: always()
        run: |
          echo "## 📊 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **App ID**: ${{ steps.app-info.outputs.app_id }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployment ID**: ${{ steps.deploy.outputs.deployment_id }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: $(doctl apps get ${{ steps.app-info.outputs.app_id }} --format ActiveDeployment.Phase --no-header)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔗 Quick Links" >> $GITHUB_STEP_SUMMARY
          echo "- [View App](https://cloud.digitalocean.com/apps/${{ steps.app-info.outputs.app_id }})" >> $GITHUB_STEP_SUMMARY
          echo "- [View Logs](https://cloud.digitalocean.com/apps/${{ steps.app-info.outputs.app_id }}/logs)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📝 Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "1. Verify app is running: \`doctl apps get ${{ steps.app-info.outputs.app_id }}\`" >> $GITHUB_STEP_SUMMARY
          echo "2. Check logs: \`doctl apps logs ${{ steps.app-info.outputs.app_id }} --type run --follow\`" >> $GITHUB_STEP_SUMMARY
          echo "3. Test endpoint: \`curl https://your-app.ondigitalocean.app/api/health\`" >> $GITHUB_STEP_SUMMARY
